server {
    listen 80;
    server_name stargio.com.br www.stargio.com.br;

    # Diretório raiz do seu projeto 
    root /stargio;
    index index.php index.html index.htm;

    # Arquivos de log do Nginx
    access_log /var/log/nginx/stargio.access.log;
    error_log /var/log/nginx/stargio.error.log;

    # Configuração principal de roteamento
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Configuração para processar o PHP
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # ATENÇÃO: Verifique a versão exata do PHP instalada no seu servidor.
        # Pode ser php7.4-fpm.sock, php8.1-fpm.sock, php8.2-fpm.sock, etc.
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock; 
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Negar acesso a arquivos ocultos por segurança (ex: .git, .env, .htaccess)
    location ~ /\. {
        deny all;
    }
}
