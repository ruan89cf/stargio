server {
    listen 80;
    server_name stargio.com.br www.stargio.com.br;

    return 301 http://stargio.xyz$request_uri;
}

server {
    listen 80;
    server_name stargio.xyz www.stargio.xyz;

    root /stargio;
    index index.php index.html index.htm;

    access_log /var/log/nginx/stargio.access.log;
    error_log /var/log/nginx/stargio.error.log;

    # Development mode: disable all client/proxy caching.
    open_file_cache off;
    etag off;
    if_modified_since off;
    expires off;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header Surrogate-Control "no-store" always;
    proxy_cache off;
    fastcgi_cache off;
    uwsgi_cache off;
    scgi_cache off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_no_cache 1;
        fastcgi_cache_bypass 1;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
